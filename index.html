<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英文單字閃卡練習</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .perspective-1000 { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        
        .card-inner {
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 隱藏滾動條但保持功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen font-sans">

    <div class="max-w-2xl mx-auto px-4 py-8 flex flex-col items-center">
        <!-- Header -->
        <header class="text-center mb-8">
            <div class="flex items-center justify-center gap-2 mb-2">
                <i data-lucide="graduation-cap" class="text-blue-600 w-8 h-8"></i>
                <h1 class="text-3xl font-bold text-slate-900">英文單字閃卡</h1>
            </div>
            <p class="text-slate-500">點擊星星存起「不會的」單字複習</p>
        </header>

        <!-- Filter Bar -->
        <div class="w-full bg-white p-4 rounded-2xl shadow-sm border border-slate-200 mb-6 flex flex-wrap gap-3 items-center justify-center">
            <select id="chapterFilter" class="bg-slate-100 border-none rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                <option value="All">全部章節</option>
                <option value="Chapter 1">Chapter 1 會議</option>
                <option value="Chapter 3">Chapter 3 社交</option>
            </select>

            <select id="posFilter" class="bg-slate-100 border-none rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                <option value="All">全部詞性</option>
                <option value="名詞">名詞</option>
                <option value="動詞">動詞</option>
                <option value="形容詞">形容詞</option>
                <option value="副詞">副詞</option>
            </select>

            <button id="toggleSaved" class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium transition-all bg-slate-100 text-slate-600 hover:bg-slate-200">
                <i data-lucide="star" id="btnStarIcon" class="w-4 h-4"></i>
                <span id="savedCountLabel">僅顯示收藏 (0)</span>
            </button>

            <div class="flex gap-2 ml-auto">
                <button id="shuffleBtn" title="隨機洗牌" class="p-2 hover:bg-slate-100 rounded-full text-slate-600 transition-colors">
                    <i data-lucide="shuffle" class="w-5 h-5"></i>
                </button>
                <button id="resetBtn" title="重設進度" class="p-2 hover:bg-red-50 rounded-full text-red-400 transition-colors">
                    <i data-lucide="rotate-ccw" class="w-5 h-5"></i>
                </button>
            </div>
        </div>

        <!-- Progress Bar -->
        <div id="progressArea" class="w-full max-w-md mb-4">
            <div class="flex justify-between text-[10px] text-slate-400 mb-1 font-bold tracking-widest uppercase">
                <span id="progressTypeLabel">PROGRESS</span>
                <span id="progressText">0 / 0</span>
            </div>
            <div class="w-full bg-slate-200 h-1.5 rounded-full overflow-hidden">
                <div id="progressBar" class="bg-blue-500 h-full transition-all duration-300 w-0"></div>
            </div>
        </div>

        <!-- Flashcard Container -->
        <div id="cardContainer" class="w-full max-w-md perspective-1000 h-80 cursor-pointer mb-10 relative">
            <div id="cardInner" class="card-inner relative w-full h-full preserve-3d">
                
                <!-- Front (English) -->
                <div class="absolute inset-0 backface-hidden bg-white border-2 border-slate-100 rounded-3xl shadow-xl flex flex-col items-center justify-center p-8 text-center">
                    <span class="absolute top-6 left-6 px-2.5 py-1 bg-blue-50 text-blue-600 text-[10px] font-bold tracking-widest rounded-md uppercase">English</span>
                    <button id="saveBtnFront" class="absolute top-5 right-5 p-2 rounded-full hover:bg-slate-100 transition-all">
                        <i data-lucide="star" class="w-7 h-7 text-slate-200"></i>
                    </button>
                    <h2 id="wordEnglish" class="text-4xl font-bold text-slate-800 break-words w-full">Word</h2>
                    <div id="wordInfo" class="mt-4 px-3 py-1 bg-slate-100 rounded-full text-slate-500 text-xs font-medium">Chapter • POS</div>
                    <p class="mt-8 text-slate-300 text-sm animate-pulse">點擊翻面</p>
                </div>

                <!-- Back (Chinese) -->
                <div id="cardBack" class="absolute inset-0 backface-hidden rotate-y-180 bg-blue-600 border-2 border-blue-500 rounded-3xl shadow-xl flex flex-col items-center justify-center p-8 text-center text-white">
                    <span class="absolute top-6 left-6 px-2.5 py-1 bg-white/20 text-white text-[10px] font-bold tracking-widest rounded-md uppercase">Chinese</span>
                    <button id="saveBtnBack" class="absolute top-5 right-5 p-2 rounded-full hover:bg-white/10 transition-all">
                        <i data-lucide="star" class="w-7 h-7 text-white/30"></i>
                    </button>
                    <h2 id="wordChinese" class="text-3xl font-semibold leading-relaxed">翻譯</h2>
                    <p class="mt-8 text-white/50 text-sm italic">點擊翻回正面</p>
                </div>

            </div>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden mt-10 text-center bg-white p-10 rounded-3xl shadow-sm border border-slate-200 max-w-sm">
            <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="search-x" class="w-8 h-8 text-slate-300"></i>
            </div>
            <h3 class="text-lg font-bold text-slate-800 mb-2">沒有找到單字</h3>
            <p id="emptyMessage" class="text-slate-500 mb-6 text-sm">請嘗試更改篩選條件，或在所有單字中點擊星星來收藏單字。</p>
            <button onclick="resetFilters()" class="px-6 py-2 bg-blue-600 text-white rounded-full font-medium hover:bg-blue-700 transition-colors">重設篩選</button>
        </div>

        <!-- Navigation -->
        <div id="navControls" class="flex items-center gap-10">
            <button id="prevBtn" class="w-14 h-14 flex items-center justify-center bg-white border border-slate-200 rounded-full shadow-md hover:bg-slate-50 transition-all active:scale-90">
                <i data-lucide="chevron-left" class="w-6 h-6 text-slate-600"></i>
            </button>
            <div class="flex flex-col items-center">
                <span id="currentIndexText" class="text-2xl font-bold text-slate-800">1</span>
                <span class="text-[10px] text-slate-400 font-bold tracking-widest uppercase">Index</span>
            </div>
            <button id="nextBtn" class="w-14 h-14 flex items-center justify-center bg-white border border-slate-200 rounded-full shadow-md hover:bg-slate-50 transition-all active:scale-90">
                <i data-lucide="chevron-right" class="w-6 h-6 text-slate-600"></i>
            </button>
        </div>

        <footer class="mt-12 text-slate-400 text-[10px] text-center leading-relaxed font-medium uppercase tracking-widest">
            自動儲存進度與收藏於此瀏覽器<br>
            Total Vocabulary: <span id="totalCount">0</span>
        </footer>
    </div>

            { word: "violent", translation: "暴力的", pos: "形容詞", chapter: "Chapter 3" },

            { word: "below", translation: "在...之下 (職位低於)", pos: "副詞", chapter: "Chapter 3" },
            { word: "originally", translation: "起初 / 原本", pos: "副詞", chapter: "Chapter 3" }
        ];

        // --- State ---
        let words = [...rawWords];
        let currentIndex = 0;
        let isFlipped = false;
        let showSavedOnly = false;
        let savedWords = new Set();
        let filters = { chapter: 'All', pos: 'All' };

        // --- Elements ---
        const cardInner = document.getElementById('cardInner');
        const wordEnglish = document.getElementById('wordEnglish');
        const wordChinese = document.getElementById('wordChinese');
        const wordInfo = document.getElementById('wordInfo');
        const currentIndexText = document.getElementById('currentIndexText');
        const progressText = document.getElementById('progressText');
        const progressBar = document.getElementById('progressBar');
        const totalCountLabel = document.getElementById('totalCount');
        const savedCountLabel = document.getElementById('savedCountLabel');
        const cardContainer = document.getElementById('cardContainer');
        const navControls = document.getElementById('navControls');
        const emptyState = document.getElementById('emptyState');
        const progressArea = document.getElementById('progressArea');
        const btnStarIcon = document.getElementById('btnStarIcon');

        // --- Core Functions ---
        function init() {
            // Load saved words from localStorage
            const stored = localStorage.getItem('myEnglishFlashcardsSaved');
            if (stored) {
                try {
                    savedWords = new Set(JSON.parse(stored));
                } catch (e) {
                    savedWords = new Set();
                }
            }
            applyFilters();
            lucide.createIcons();
            document.getElementById('totalCount').innerText = rawWords.length;
        }

        function applyFilters() {
            words = rawWords.filter(item => {
                const matchChapter = filters.chapter === 'All' || item.chapter === filters.chapter;
                const matchPos = filters.pos === 'All' || item.pos === filters.pos;
                const matchSaved = !showSavedOnly || savedWords.has(item.word);
                return matchChapter && matchPos && matchSaved;
            });

            currentIndex = 0;
            updateUI();
        }

        function updateUI() {
            // Update Toggle Button
            const toggleBtn = document.getElementById('toggleSaved');
            if (showSavedOnly) {
                toggleBtn.classList.remove('bg-slate-100', 'text-slate-600');
                toggleBtn.classList.add('bg-amber-100', 'text-amber-700', 'border-amber-200');
                btnStarIcon.classList.add('fill-amber-500', 'text-amber-500');
                document.getElementById('progressTypeLabel').innerText = "SAVED WORDS";
            } else {
                toggleBtn.classList.add('bg-slate-100', 'text-slate-600');
                toggleBtn.classList.remove('bg-amber-100', 'text-amber-700', 'border-amber-200');
                btnStarIcon.classList.remove('fill-amber-500', 'text-amber-500');
                document.getElementById('progressTypeLabel').innerText = "PROGRESS";
            }
            savedCountLabel.innerText = `僅顯示收藏 (${savedWords.size})`;

            if (words.length === 0) {
                cardContainer.classList.add('hidden');
                navControls.classList.add('hidden');
                progressArea.classList.add('hidden');
                emptyState.classList.remove('hidden');
                document.getElementById('emptyMessage').innerText = showSavedOnly && savedWords.size === 0 
                    ? "你的收藏清單目前是空的，快去點擊星星標記不會的字吧！" 
                    : "沒有符合目前篩選條件的單字。";
                return;
            }

            cardContainer.classList.remove('hidden');
            navControls.classList.remove('hidden');
            progressArea.classList.remove('hidden');
            emptyState.classList.add('hidden');

            const current = words[currentIndex];
            wordEnglish.innerText = current.word;
            wordChinese.innerText = current.translation;
            wordInfo.innerText = `${current.chapter} • ${current.pos}`;
            
            currentIndexText.innerText = currentIndex + 1;
            progressText.innerText = `${currentIndex + 1} / ${words.length}`;
            progressBar.style.width = `${((currentIndex + 1) / words.length) * 100}%`;
            
            // Star Icons
            const isSaved = savedWords.has(current.word);
            const stars = [document.querySelector('#saveBtnFront i'), document.querySelector('#saveBtnBack i')];
            stars.forEach(star => {
                if (isSaved) {
                    star.classList.add('fill-current', 'text-amber-400');
                    star.classList.remove('text-slate-200', 'text-white/30');
                    if (star.closest('#saveBtnBack')) star.classList.replace('text-amber-400', 'text-white');
                } else {
                    star.classList.remove('fill-current', 'text-amber-400', 'text-white');
                    star.classList.add(star.closest('#saveBtnFront') ? 'text-slate-200' : 'text-white/30');
                }
            });

            // Reset flip
            isFlipped = false;
            cardInner.classList.remove('rotate-y-180');
        }

        function toggleFlip() {
            isFlipped = !isFlipped;
            cardInner.classList.toggle('rotate-y-180', isFlipped);
        }

        function toggleSave(e) {
            e.stopPropagation();
            const word = words[currentIndex].word;
            if (savedWords.has(word)) {
                savedWords.delete(word);
            } else {
                savedWords.add(word);
            }
            localStorage.setItem('myEnglishFlashcardsSaved', JSON.stringify(Array.from(savedWords)));
            updateUI();
        }

        function nextCard() {
            if (words.length === 0) return;
            currentIndex = (currentIndex + 1) % words.length;
            updateUI();
        }

        function prevCard() {
            if (words.length === 0) return;
            currentIndex = (currentIndex - 1 + words.length) % words.length;
            updateUI();
        }

        function resetFilters() {
            filters.chapter = 'All';
            filters.pos = 'All';
            showSavedOnly = false;
            document.getElementById('chapterFilter').value = 'All';
            document.getElementById('posFilter').value = 'All';
            applyFilters();
        }

        // --- Event Listeners ---
        cardContainer.addEventListener('click', toggleFlip);
        document.getElementById('saveBtnFront').addEventListener('click', toggleSave);
        document.getElementById('saveBtnBack').addEventListener('click', toggleSave);
        document.getElementById('nextBtn').addEventListener('click', nextCard);
        document.getElementById('prevBtn').addEventListener('click', prevCard);

        document.getElementById('chapterFilter').addEventListener('change', (e) => {
            filters.chapter = e.target.value;
            applyFilters();
        });

        document.getElementById('posFilter').addEventListener('change', (e) => {
            filters.pos = e.target.value;
            applyFilters();
        });

        document.getElementById('toggleSaved').addEventListener('click', () => {
            showSavedOnly = !showSavedOnly;
            applyFilters();
        });

        document.getElementById('shuffleBtn').addEventListener('click', () => {
            words.sort(() => Math.random() - 0.5);
            currentIndex = 0;
            updateUI();
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            if (confirm("確定要重設過濾條件並回到第一個單字嗎？")) {
                resetFilters();
            }
        });

        // Keyboard Support
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextCard();
            if (e.key === 'ArrowLeft') prevCard();
            if (e.key === ' ' || e.key === 'Enter') toggleFlip();
        });

        // Initialize
        init();
    </script>
